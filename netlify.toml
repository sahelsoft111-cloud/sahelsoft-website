[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/sugucash"
  to = "/sugucash/index.html"
  status = 200

[[redirects]]
  from = "/sugucash/"
  to = "/sugucash/index.html"
  status = 200

[[redirects]]
  from = "/agrisuivi-pro"
  to = "/agrisuivi-pro/index.html"
  status = 200

[[redirects]]
  from = "/agrisuivi-pro/"
  to = "/agrisuivi-pro/index.html"
  status = 200

[[redirects]]
  from = "/privacy/agrisuivi-pro"
  to = "/privacy/agrisuivi-pro/index.html"
  status = 200

[[redirects]]
  from = "/privacy/agrisuivi-pro/"
  to = "/privacy/agrisuivi-pro/index.html"
  status = 200

[[redirects]]
  from = "/delete-account/agrisuivi-pro"
  to = "/delete-account/agrisuivi-pro/index.html"
  status = 200

[[redirects]]
  from = "/delete-account/agrisuivi-pro/"
  to = "/delete-account/agrisuivi-pro/index.html"
  status = 200

[[redirects]]
  from = "/delete-account/agrisuivi-pro.html"
  to = "/delete-account/agrisuivi-pro/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
